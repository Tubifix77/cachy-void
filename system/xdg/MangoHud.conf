# Cachy-Void default MangoHud config — architecture.md §3.4.
# System default, installed to /etc/xdg/MangoHud/MangoHud.conf; a user's own
# ~/.config/MangoHud/MangoHud.conf overrides it. Deliberately RESTRAINED to match
# the low-key branding (branding.md): telemetry, not a christmas tree — a compact
# top-left readout, muted panel, accent green (#478061) only for the live GPU/FPS.
#
# Shown only when a game runs under MANGOHUD=1 (e.g. `CACHY_HUD=1 cachy-game …`).
# Toggle in-game with Shift_R+F12; toggle the frametime graph with Shift_L+F11.

### Layout
position=top-left
font_size=20
table_columns=2
background_alpha=0.4
round_corners=6
horizontal=0

### Palette (branding.md — hex without leading '#')
text_color=abb2bf
background_color=1b1d1e
gpu_color=478061
cpu_color=abb2bf
engine_color=478061
frametime_color=478061
vram_color=6a8f7d
ram_color=6a8f7d

### Frame rate + smoothness
fps
frame_timing=1
frametime=1

### GPU
gpu_stats
gpu_temp
gpu_load_change

### CPU
cpu_stats
cpu_temp
cpu_load_change

### Memory
vram
ram

### Keep it quiet
no_small_font
