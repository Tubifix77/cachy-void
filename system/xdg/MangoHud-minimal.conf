# Cachy-Void MangoHud config — MINIMAL / legacy-Optimus profile (architecture.md §3.4).
# Installed to /etc/xdg/MangoHud/MangoHud.conf by deploy.sh when it detects a
# legacy NVIDIA Optimus laptop (driver series <= 470, e.g. Kepler GT 730M).
#
# WHY this variant exists: on legacy Optimus the discrete GPU's load/power/temp
# counters are NOT reliably exposed via NVML during PRIME render-offload — even
# nvidia-smi struggles — so MangoHud's GPU panel reads a misleading 0% while a
# game is actually rendering on the dGPU. Rather than show wrong numbers (or drop
# MangoHud entirely), this profile omits the GPU sensors and keeps what IS
# accurate: FPS and frametime (measured at swapchain present, independent of the
# GPU sensors) plus CPU. Same restrained look as the default (branding.md).
#
# Shown only under MANGOHUD=1 (e.g. `CACHY_HUD=1 cachy-game …`). Toggle: Shift_R+F12.
# On non-Optimus / modern-NVIDIA / AMD / Intel hosts, deploy.sh installs the full
# MangoHud.conf (with GPU stats) instead.

### Layout
position=top-left
font_size=20
table_columns=2
background_alpha=0.4
round_corners=6
horizontal=0

### Palette (branding.md — hex without leading '#')
text_color=abb2bf
background_color=1b1d1e
cpu_color=abb2bf
engine_color=478061
frametime_color=478061
ram_color=6a8f7d

### Frame rate + smoothness (accurate on Optimus — swapchain-based)
fps
frame_timing=1
frametime=1

### CPU
cpu_stats
cpu_temp
cpu_load_change

### Memory
ram

### NOTE: no gpu_stats / gpu_temp / gpu_load — unreliable on legacy Optimus (see above).

### Keep it quiet
no_small_font
