# Cachy-Void MangoHud config — MINIMAL / legacy-Optimus profile (architecture.md §3.4).
# Installed to /etc/xdg/MangoHud/MangoHud.conf by deploy.sh when it detects a
# legacy NVIDIA Optimus laptop (driver <= 470, e.g. Kepler GT 730M), and seeded
# into ~/.config/MangoHud/ by cachy-game so it also reaches Proton games (which
# run in a container that can't see the host's /etc/xdg).
#
# WHY this variant exists: on legacy Optimus the discrete GPU's load/power/temp
# counters are NOT reliably exposed via NVML during PRIME render-offload — even
# nvidia-smi struggles — so MangoHud's GPU panel reads a misleading 0% while a
# game is actually rendering on the dGPU. This profile disables the GPU sensors
# and keeps what IS accurate: FPS and frametime (swapchain-based, independent of
# the GPU sensors) plus CPU. Same restrained look as the default (branding.md).
#
# NOTE on MangoHud config semantics: keys are DEFAULTS + overrides, not a
# whitelist — a default-on feature (like gpu_stats) must be turned off with
# `=0`, not merely omitted. And `frame_timing` (the frametime line GRAPH) needs
# horizontal room; it is intentionally left OFF here to avoid label collisions in
# a compact overlay — the numeric `frametime` gives the same info without a graph.
#
# Shown only under MANGOHUD=1 (e.g. `CACHY_HUD=1 cachy-game …`). Toggle: Shift_R+F12.

### Layout
position=top-left
font_size=20
background_alpha=0.4
round_corners=6

### Palette (branding.md — hex without leading '#')
text_color=abb2bf
background_color=1b1d1e
cpu_color=abb2bf
engine_color=478061
frametime_color=478061
ram_color=6a8f7d

### Frame rate + frametime value (accurate on Optimus — swapchain-based)
fps
frametime

### CPU
cpu_stats
cpu_temp
cpu_load_change

### Memory
ram

### GPU sensors OFF — unreliable on legacy Optimus (NVML can't read the dGPU
### during PRIME offload). gpu_stats is ON by default, so it must be disabled
### explicitly (one line per detected GPU otherwise: gpu0=iGPU, gpu1=dGPU).
gpu_stats=0
vram=0

### Keep it quiet
no_small_font
