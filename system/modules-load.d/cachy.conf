# Cachy-Void boot-time module loads — architecture.md §3.1
#
# Installed to /etc/modules-load.d/cachy.conf by deploy.sh.
# On the stock Void fallback kernel, BBR is a module, so the
# net.ipv4.tcp_congestion_control = bbr sysctl would silently fail without
# this. On linux-cachy, BBR is built in (§2.4) and this is a harmless no-op.
tcp_bbr
