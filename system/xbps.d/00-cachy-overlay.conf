# Cachy-Void local overlay repositories — architecture.md §4.6, §7.2
#
# xbps.d files are read in C-locale filename order; this file sorts before
# 00-repository-main.conf, so on version ties XBPS resolves to our locally
# built, optimized binaries rather than the upstream mirror.
#
# Both roots are listed (§7.2): free packages land in binpkgs, restricted
# (nonfree) targets such as nvidia land in binpkgs/nonfree.
#
# The repository paths below are filled in with the absolute void-packages path
# by deploy.sh.
repository=@VOID_PACKAGES@/hostdir/binpkgs
repository=@VOID_PACKAGES@/hostdir/binpkgs/nonfree
