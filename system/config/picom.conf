# Cachy-Void compositor — architecture.md/branding.md §5.3 (Picom, X11).
# Tight, dark, MATTE shadows — a thin separation from the backdrop, never a glowy
# halo. No blur, no glass, no rounded corners (flat per branding). xrender backend
# is chosen for compatibility with the nvidia470 legacy driver (glx can misbehave
# on Kepler); modern GPUs may switch to "glx".

backend = "xrender";
vsync = true;

# --- matte shadows ---
shadow = true;
shadow-radius = 6;
shadow-opacity = 0.55;
shadow-offset-x = -6;
shadow-offset-y = -6;
shadow-color = "#000000";
shadow-exclude = [
  "class_g = 'Plank'",
  "class_g = 'Conky'",
  "class_g = 'tint2'",
  "_NET_WM_WINDOW_TYPE@:a = '_NET_WM_WINDOW_TYPE_DESKTOP'",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
];

# --- snappy, instant fades (motion is feedback, not decoration) ---
fading = true;
fade-in-step = 0.08;
fade-out-step = 0.08;

# --- flat: no rounded corners, no blur ---
corner-radius = 0;
