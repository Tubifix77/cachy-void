<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Cachy-Void wallpaper — performance core (schematic)">
  <!-- Cachy-Void wallpaper v2 (branding.md palette). Void: obsidian field, honest flat
       geometry, restraint. Cachy: a tuned performance core — concentric frames + a
       rotated diamond, schematic annotations, a blueprint grid. One green accent; a tiny
       VOID punched at the core's center (Void inside Cachy). Text lives in a clear corner. -->
  <defs>
    <pattern id="grid" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M120 0 H0 V120" fill="none" stroke="#282c34" stroke-width="1" opacity="0.28"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="#1b1d1e"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <!-- faint schematic crosshair through the core -->
  <g stroke="#282c34" stroke-width="1" opacity="0.55">
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
  </g>

  <g transform="translate(960,540)" fill="none">
    <!-- concentric frames: bright inner -> faint outer -->
    <rect x="-90"  y="-90"  width="180" height="180" stroke="#abb2bf" stroke-width="2"/>
    <rect x="-150" y="-150" width="300" height="300" stroke="#5c6370" stroke-width="1.6"/>
    <rect x="-220" y="-220" width="440" height="440" stroke="#5c6370" stroke-width="1.4"/>
    <rect x="-300" y="-300" width="600" height="600" stroke="#3a3f4b" stroke-width="1.3"/>
    <rect x="-390" y="-390" width="780" height="780" stroke="#2f3440" stroke-width="1.2"/>
    <!-- rotated diamond overlay (the standout Gemini element) -->
    <rect x="-232" y="-232" width="464" height="464" transform="rotate(45)" stroke="#5c6370" stroke-width="1.2" opacity="0.7"/>
    <!-- corner registration ticks on the outer frame -->
    <g stroke="#3a3f4b" stroke-width="1.4">
      <path d="M-390 -366 V-390 H-366"/><path d="M366 -390 H390 V-366"/>
      <path d="M390 366 V390 H366"/><path d="M-366 390 H-390 V366"/>
    </g>
  </g>

  <!-- the green performance core, with a small VOID at its center -->
  <polygon points="960,492 1008,540 960,588 912,540" fill="#478061"/>
  <polygon points="960,524 976,540 960,556 944,540" fill="#1b1d1e"/>

  <!-- honest schematic annotation, clear bottom-right corner, right-aligned -->
  <g font-family="'JetBrains Mono','IBM Plex Mono',ui-monospace,monospace" fill="#5c6370" text-anchor="end">
    <text x="1864" y="978"  font-size="20" fill="#abb2bf" letter-spacing="2">cachy · void</text>
    <text x="1864" y="1004" font-size="14" letter-spacing="1">performance core</text>
    <text x="1864" y="1028" font-size="12" letter-spacing="1">runit · xbps · BORE · no-systemd</text>
  </g>
</svg>
