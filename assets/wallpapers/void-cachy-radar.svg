<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Cachy-Void wallpaper — radar">
  <!-- Void's circular/spiral logo vibe: concentric rings pulsing from the green core. -->
  <defs>
    <pattern id="g" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M120 0 H0 V120" fill="none" stroke="#282c34" stroke-width="1" opacity="0.22"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="#1b1d1e"/>
  <rect width="1920" height="1080" fill="url(#g)"/>
  <g transform="translate(960,540)" fill="none">
    <circle r="470" stroke="#262c2a" stroke-width="1.2"/>
    <circle r="370" stroke="#2b3a34" stroke-width="1.3"/>
    <circle r="275" stroke="#35564a" stroke-width="1.4"/>
    <circle r="185" stroke="#5c6370" stroke-width="1.6"/>
    <circle r="105" stroke="#6a8f7d" stroke-width="1.8"/>
    <!-- radar ticks -->
    <g stroke="#3a3f4b" stroke-width="1.2">
      <line x1="0" y1="-470" x2="0" y2="-440"/><line x1="0" y1="470" x2="0" y2="440"/>
      <line x1="-470" y1="0" x2="-440" y2="0"/><line x1="470" y1="0" x2="440" y2="0"/>
    </g>
  </g>
  <polygon points="960,492 1008,540 960,588 912,540" fill="#478061"/>
  <polygon points="960,524 976,540 960,556 944,540" fill="#1b1d1e"/>
</svg>
